<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Notice</title>
        <style>
            @layer base, composite, element, variant, page;
        </style>
        <link rel="stylesheet" href="/css/base/reset.css" />
        <link rel="stylesheet" href="/css/base/theme.css" />

        <link rel="stylesheet" href="/css/component/icon.css" />
        <link rel="stylesheet" href="/css/component/notice.css" />
        <link rel="stylesheet" href="/css/component/menu.css" />
        <link rel="stylesheet" href="/css/component/button.css" />

        <link rel="stylesheet" href="/css/variant/icon.css" />
        <link rel="stylesheet" href="/css/variant/notice.css" />
        <link rel="stylesheet" href="/css/variant/menu.css" />
        <link rel="stylesheet" href="/css/variant/button.css" />

        <link rel="stylesheet" href="/css/utilities.css" />
        <link rel="stylesheet" href="/css/prism.css" />
        <link rel="stylesheet" href="/css/page.css" />
        <link rel="stylesheet" href="/css/prism.css" />
        <link rel="stylesheet" href="/css/typography.css" />
    </head>
    <body>
        <global-nav></global-nav>
        <template id="main__content">
            <article id="article">
                <h2>Notice</h2>
                <section>
                    <div class="notice">
                        <div class="notice__section">
                            <icon-info
                                class="icon"
                                data-variant="l"
                            ></icon-info>
                        </div>
                        <div class="notice__section">
                            <strong class="notice__title"
                                >We notify you that</strong
                            >
                            You are obligated to give Contour a star on GitHub
                        </div>
                        <button
                            class="button margin-inline-start-auto"
                            data-variant="icon-ghost"
                        >
                            <icon-x class="icon"></icon-x>
                        </button>
                    </div>
                </section>
                <section>
                    <div class="notice">
                        <div class="notice__section">
                            <icon-info
                                class="icon"
                                data-variant="l"
                            ></icon-info>
                        </div>
                        <div class="notice__section">
                            <strong class="notice__title"
                                >We notify you that</strong
                            >
                            You are obligated to give Contour a star on GitHub
                        </div>
                        <div
                            class="notice__section margin-inline-start-auto"
                            data-variant="close-segmented"
                        >
                            <button
                                class="button"
                                data-variant="close-segmented"
                            >
                                <icon-x class="icon"></icon-x>
                            </button>
                        </div>
                    </div>
                </section>
                <section>
                    <div class="notice items-stretch">
                        <div
                            class="notice__section"
                            style="align-items: center"
                        >
                            <icon-info
                                class="icon"
                                data-variant="l"
                            ></icon-info>
                        </div>
                        <div class="notice__section">
                            <strong class="notice__title">Server ready</strong>
                            The server you requested has been provisioned.
                            <div class="notice__section" data-variant="control">
                                <button class="button" data-variant="flat">
                                    View server
                                </button>
                            </div>
                        </div>
                        <div class="notice__section margin-inline-start-auto">
                            <button
                                class="button notice--close"
                                data-variant="icon-ghost"
                            >
                                <icon-x class="icon"></icon-x>
                            </button>
                        </div>
                    </div>
                </section>
                <section>
                    <div
                        class="notice items-stretch"
                        data-variant="icon-cornered"
                    >
                        <icon-info-square-fill
                            class="icon"
                            data-variant="icon-cornered"
                        ></icon-info-square-fill>
                        <div class="notice__section">
                            <strong class="notice__title">Server ready</strong>
                            The server you requested has been provisioned.
                            <div class="notice__section" data-variant="control">
                                <button class="button" data-variant="flat">
                                    View server
                                </button>
                            </div>
                        </div>
                        <div class="notice__section margin-inline-start-auto">
                            <button
                                class="button notice--close"
                                data-variant="icon-ghost"
                            >
                                <icon-x class="icon"></icon-x>
                            </button>
                        </div>
                    </div>
                </section>
                <section>
                    <div class="notice items-stretch" data-variant="icon-top">
                        <icon-info-square-fill
                            class="icon"
                            data-variant="icon-top"
                        ></icon-info-square-fill>
                        <div class="notice__section">
                            <strong class="notice__title">Server ready</strong>
                            The server you requested has been provisioned.
                            <div class="notice__section" data-variant="control">
                                <button class="button" data-variant="flat">
                                    View server
                                </button>
                            </div>
                        </div>
                    </div>
                </section>
                <section>
                    <div class="notice" data-variant="title-segmented">
                        <div class="notice__title" data-variant="title-segmented">
                            <icon-info
                                class="icon"
                            ></icon-info>
                            Server ready
                        </div>
                        <div class="notice__section" data-variant="title-segmented">
                            The server you requested has been provisioned.
                            <div class="notice__section" data-variant="control">
                                <button class="button" data-variant="flat">
                                    View server
                                </button>
                            </div>
                        </div>
                    </div>
                </section>
            </article>
        </template>
        <script src="/js/main.js" type="module"></script>
        <script src="/js/prism.js"></script>
    </body>
</html>
