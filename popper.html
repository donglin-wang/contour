<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <style>
            #tooltip {
                width: max-content;
                position: absolute;
                top: 0;
                left: 0;
                background: #222;
                color: white;
                font-weight: bold;
                padding: 5px;
                border-radius: 4px;
                font-size: 90%;
            }

            #arrow {
                position: absolute;
                width: 8px;
                height: 4px;
            }
        </style>
    </head>
    <body>
        <button id="button" aria-describedby="tooltip">My button</button>
        <div id="tooltip" role="tooltip">
            My tooltip
            <svg
                id="arrow"
                width="8"
                height="4"
                viewBox="0 0 8 4"
                xmlns="http://www.w3.org/2000/svg"
            >
                <path
                    d="M4 0.5 
                        A0.5 0.5 0 0 1 4 0.5
                        L7.5 3.5 
                        L0.5 3.5 
                        Z"
                    fill="black"
                />
            </svg>
        </div>
        <script type="module">
            import {
                computePosition,
                flip,
                shift,
                offset,
                arrow,
            } from "https://cdn.jsdelivr.net/npm/@floating-ui/dom@1.7.4/+esm";

            const button = document.querySelector("#button");
            const tooltip = document.querySelector("#tooltip");
            const arrowElement = document.querySelector("#arrow");

            computePosition(button, tooltip, {
                placement: "right",
                middleware: [
                    offset(6),
                    flip(),
                    shift({ padding: 5 }),
                    arrow({ element: arrowElement }),
                ],
            }).then(({ x, y, placement, middlewareData }) => {
                Object.assign(tooltip.style, {
                    left: `${x}px`,
                    top: `${y}px`,
                });

                // Accessing the data
                const { x: arrowX, y: arrowY } = middlewareData.arrow;

                const staticSide = {
                    top: "bottom",
                    right: "left",
                    bottom: "top",
                    left: "right",
                }[placement.split("-")[0]];

                Object.assign(arrowElement.style, {
                    left: arrowX != null ? `${arrowX}px` : "",
                    top: arrowY != null ? `${arrowY}px` : "",
                    right: "",
                    bottom: "",
                    [staticSide]: "-6px",
                    rotate: "-90deg",
                });

                console.log({
                    left: arrowX != null ? `${arrowX}px` : "",
                    top: arrowY != null ? `${arrowY}px` : "",
                    right: "",
                    bottom: "",
                    [staticSide]: "-4px",
                });
            });
        </script>
    </body>
</html>
