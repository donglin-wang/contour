<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contour</title>
    <style>
        :root {
            --color: #212529;
            --color-muted: #343a40;
            --background-color: #ffffff;
            --background-color-muted: #efefef;

            --article-max-width: 65ch;
            --article-margin-block: 3rem;
            --article-description-font-size: var(--font-size-content-xl);
        }

        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", "Noto Sans", "Liberation Sans", Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
        }

        #article {
            width: 100%;
            max-width: var(--article-max-width);
            margin: auto;
            margin-block: var(--article-margin-block);
        }
    </style>
    <style>
        @import url(css/reset.css);
        @import url(css/base/base.css);
    </style>
</head>

<body>
    <article id="article">
        <h2>Button</h2>
        <p>
            <button class="button">Button</button>
        </p>
        <h2>Alert</h2>
        <p>
        <div class="alert">
            <div class="alert-content">
                This is a very long alert aiming to demonstrate messages that span across multiple lines.
            </div>
            <div class="alert-control">
                <button class="alert-button button">Confirm</button>
                <button class="alert-button button">Cancel</button>
            </div>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="alert-close"
                viewBox="0 0 16 16">
                <path
                    d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708" />
            </svg>
        </div>
        </p>
        <p>
        <div class="alert">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="alert-icon"
                viewBox="0 0 16 16">
                <path
                    d="M2 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2zm6 4c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 4.995A.905.905 0 0 1 8 4m.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2" />
            </svg>
            <div class="alert-content">
                <h5 class="alert-title">Alert title</h5>
                <span class="alert-text">
                    Take note how the ordering of <code>alert-button</code> and <code>button</code> does not change the
                    outcome. Similarly,
                    changing the import order of the two style sheets also doesn't change the outcome
                </span>
                <div class="alert-control">
                    <button class="alert-button button">Confirm</button>
                    <button class="alert-button button">Cancel</button>
                </div>
            </div>

            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="alert-close"
                viewBox="0 0 16 16">
                <path
                    d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708" />
            </svg>
        </div>

        </p>
    </article>
</body>

</html>
